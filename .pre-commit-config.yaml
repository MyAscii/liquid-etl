# Gate: fast, deterministic, local. Runs on every commit.
# Install once with: pre-commit install
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(src|tests|services|tune_ingest\.py)
      - id: ruff-format
        files: ^(src|tests|services|tune_ingest\.py)

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: ^(src|tests|services|tune_ingest\.py)

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        files: ^(src|tests|services|tune_ingest\.py)

  - repo: local
    hooks:
      - id: pytest-gate
        name: pytest (gate lane)
        entry: pytest -q -m "not integration and not e2e"
        language: system
        pass_filenames: false
        always_run: true
